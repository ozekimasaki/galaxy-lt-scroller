<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Galaxy LT Scroller</title>
    <script type="module" crossorigin src="/assets/index-DEiD9Ak_.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DX-5gGOs.css">
  </head>
  <body>
    <main class="app" aria-label="Galaxy LT Scroller presentation">
      <div class="stars stars-a" aria-hidden="true"></div>
      <div class="stars stars-b" aria-hidden="true"></div>
      <div class="stars stars-c" aria-hidden="true"></div>
      <div class="space-vignette" aria-hidden="true"></div>

      <section class="stage" aria-live="polite">
        <div class="vanish-mask" aria-hidden="true"></div>
        <div id="crawl-root" class="crawl-root"></div>
      </section>

      <aside class="hud" aria-label="presentation controls">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Galaxy LT Scroller</span>
        </div>
        <div class="hud-meta">
          <span id="state-label">Standby</span>
          <span id="section-label">1 / 5</span>
        </div>
        <div class="hud-actions">
          <button id="primary-action" type="button" title="Enterと同じ操作">Start</button>
          <button id="auto-action" type="button" title="Aキーで自動再生を切替">Auto Off</button>
          <button id="reset-action" type="button" title="最初から再生">Reset</button>
        </div>
      </aside>

      <div class="prompt">
        <kbd>Enter</kbd>
        <span id="prompt-text">開始</span>
      </div>
    </main>

  </body>
</html>
