<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">3D crawl media flow</title>
  <desc id="desc">Text and media blocks moving through a perspective presentation corridor.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#03111f"/>
      <stop offset="0.52" stop-color="#062b46"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#ffc107"/>
      <stop offset="1" stop-color="#fff3bf"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity=".28" stroke="#78d9ff" stroke-width="2">
    <path d="M160 675 640 95 1120 675" fill="none"/>
    <path d="M0 566h1280M125 446h1030M236 345h808M322 262h636M390 196h500" fill="none"/>
  </g>
  <g filter="url(#glow)">
    <rect x="445" y="116" width="390" height="70" rx="12" fill="#78d9ff" opacity=".16" stroke="#9be6ff"/>
    <rect x="362" y="234" width="556" height="94" rx="14" fill="#78d9ff" opacity=".18" stroke="#9be6ff"/>
    <rect x="262" y="390" width="756" height="136" rx="16" fill="#78d9ff" opacity=".2" stroke="#9be6ff"/>
  </g>
  <g fill="url(#gold)" font-family="Segoe UI, Arial, sans-serif" font-weight="800" text-anchor="middle">
    <text x="640" y="160" font-size="30">SECTION 01</text>
    <text x="640" y="292" font-size="44">TEXT + IMAGE</text>
    <text x="640" y="472" font-size="58">ENTER CONTROLLED FLOW</text>
  </g>
  <g fill="none" stroke="#ffc107" stroke-linecap="round" stroke-width="8" opacity=".82">
    <path d="M278 593c184-56 540-56 724 0"/>
    <path d="m985 560 46 36-56 20"/>
  </g>
</svg>
